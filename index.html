<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evelyn Nguyen — Portfolio</title>
    <meta name="description" content="Personal portfolio" />

    <!-- bootstrap -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <!-- bootstrap icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
</html>
 <body>
    <!-- navbar -->
    <nav
      class="navbar navbar-expand-lg fixed-top"
      id="navbar"
      aria-label="Main navigation"
    >
      <div class="container-fluid px-4 px-lg-5">
        <a class="navbar-brand brand-logo" href="#hero" aria-label="Home">
          <span class="cat-mark" aria-hidden="true">𖦹</span> Evelyn Nguyen
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="toggler-line"></span>
          <span class="toggler-line"></span>
        </button>
        <div class="collapse navbar-collapse justify-content-end" id="navMenu">
          <ul class="navbar-nav gap-lg-4">
            <li class="nav-item">
              <a class="nav-link" href="#about">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#experience">Experience</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#projects">Projects</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="#contact">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>
      <!--  HERO  -->
      <section id="hero" class="hero-section" aria-label="Hero">
        <div class="hero-bg-text" aria-hidden="true">Portfolio</div>
        <div class="container h-100 d-flex flex-column justify-content-center">
          <div class="hero-content">
            <p class="hero-eyebrow">NERDY &amp; CREATIVE</p>
            <h1 class="hero-name">Evelyn<br /><em>Nguyen</em></h1>
            <p class="hero-tagline">
              a CS student who enjoys building with code,<br />and bonding over
              film, fashion, and nerdy favorites too.
            </p>
            <a href="#about" class="hero-cta" aria-label="Scroll to About">
              <span>Discover</span>
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                aria-hidden="true"
              >
                <line
                  x1="8"
                  y1="2"
                  x2="8"
                  y2="14"
                  stroke="currentColor"
                  stroke-width="1"
                />
                <polyline
                  points="4,10 8,14 12,10"
                  stroke="currentColor"
                  stroke-width="1"
                  fill="none"
                />
              </svg>
            </a>
          </div>
        </div>
        <div class="hero-decor" aria-hidden="true">
          <img src="images/pfp.png" alt="me pic" class="hero-decor-img img-1" />
          <img src="images/coffee.png" alt="coffee pic" class="hero-decor-img img-2" />
          <img src="images/cat.png" alt="cat pic" class="hero-decor-img img-3" />
        </div>

        <div class="scroll-line" aria-hidden="true"></div>
      </section>

      </main>
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
